<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>룰렛 게임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #e0e0e0;
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .roulette-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }

        /* 원형 판 */
        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #16213e 0%, #0f3460 60%, #1a1a2e 100%);
            border: 6px solid #e94560;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* 눈금 표시 */
        .tick {
            position: absolute;
            width: 3px;
            height: 15px;
            background: rgba(255, 255, 255, 0.4);
            top: 8px;
            left: 50%;
            transform-origin: 50% 154px;
        }

        .tick.major {
            height: 22px;
            width: 4px;
            background: rgba(255, 255, 255, 0.7);
        }

        /* 중앙 점 */
        .center-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #e94560;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.8);
        }

        /* 초침 */
        .needle {
            position: absolute;
            width: 6px;
            height: 130px;
            background: linear-gradient(to top, #e94560, #ff6b6b);
            top: 50%;
            left: 50%;
            transform-origin: 50% 0%;
            transform: translate(-50%, 0) rotate(0deg);
            border-radius: 0 0 3px 3px;
            z-index: 5;
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.6);
            /* 아래로 뻗도록 (12시 방향이 기본, 회전하며 가리킴) */
            top: 50%;
        }

        .needle.spinning {
            animation: spin 0.8s linear infinite;
        }

        .needle.stopping {
            animation: none;
        }

        @keyframes spin {
            from { transform: translate(-50%, 0) rotate(0deg); }
            to { transform: translate(-50%, 0) rotate(360deg); }
        }

        /* 멈출 때 효과 */
        .circle.stopped {
            animation: pulse 0.5s ease-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 40px rgba(233, 69, 96, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.5); }
            50% { box-shadow: 0 0 80px rgba(233, 69, 96, 0.8), inset 0 0 30px rgba(0, 0, 0, 0.5); }
            100% { box-shadow: 0 0 40px rgba(233, 69, 96, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.5); }
        }

        /* 버튼 영역 */
        .buttons {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 2px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.6);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-stop {
            background: linear-gradient(135deg, #e94560, #e17055);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-stop:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            margin-top: 25px;
            color: #e0e0e0;
            font-size: 1.1rem;
            min-height: 30px;
        }

        /* 조롱 메시지 */
        .roast-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 3rem;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8), 0 0 40px rgba(255, 107, 107, 0.4);
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }

        .roast-msg.show {
            animation: roastIn 0.6s ease-out forwards;
        }

        @keyframes roastIn {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .roast-sub {
            position: fixed;
            top: calc(50% + 50px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.3rem;
            color: #ffd32a;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
        }

        .roast-sub.show {
            animation: subIn 0.5s 0.4s ease-out forwards;
        }

        @keyframes subIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* 화면 흔들림 */
        body.shake {
            animation: shakeIt 0.5s ease-out;
        }

        @keyframes shakeIt {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-10px) rotate(-1deg); }
            20% { transform: translateX(10px) rotate(1deg); }
            30% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            50% { transform: translateX(-5px); }
            60% { transform: translateX(5px); }
            70% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        /* 배경 번쩍 */
        .flash-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(233, 69, 96, 0.3);
            z-index: 50;
            pointer-events: none;
            opacity: 0;
        }

        .flash-overlay.show {
            animation: flashBg 0.6s ease-out;
        }

        @keyframes flashBg {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 파티클 */
        .particle {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
        }

        /* 반응형 */
        @media (min-width: 500px) {
            .roulette-container {
                width: 400px;
                height: 400px;
            }
            .tick {
                transform-origin: 50% 194px;
            }
            .needle {
                height: 165px;
            }
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>ROULETTE</h1>

    <div class="roulette-container">
        <div class="circle" id="circle">
            <!-- 눈금은 JS로 생성 -->
            <div class="needle" id="needle"></div>
            <div class="center-dot"></div>
        </div>
    </div>

    <div class="buttons">
        <button class="btn-start" id="btnStart" onclick="startSpin()">START</button>
        <button class="btn-stop" id="btnStop" onclick="stopSpin()" disabled>STOP</button>
    </div>

    <div class="status" id="status">버튼을 눌러 시작하세요</div>
    <div class="flash-overlay" id="flash"></div>
    <div class="roast-msg" id="roastMsg"></div>
    <div class="roast-sub" id="roastSub"></div>

    <script>
        const needle = document.getElementById('needle');
        const circle = document.getElementById('circle');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const status = document.getElementById('status');

        let isSpinning = false;
        let currentAngle = 0;
        let animationId = null;
        let lastTime = null;
        const SPEED = 2880; // 초당 2880도 (1초에 8바퀴)

        // 눈금 생성
        function createTicks() {
            for (let i = 0; i < 12; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick' + (i % 3 === 0 ? ' major' : '');
                tick.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
                circle.appendChild(tick);
            }
        }
        createTicks();

        function updateNeedle() {
            needle.style.transform = `translate(-50%, 0) rotate(${currentAngle}deg)`;
        }

        function animate(time) {
            if (!isSpinning) return;

            if (lastTime === null) {
                lastTime = time;
            }

            const delta = (time - lastTime) / 1000; // 초 단위
            lastTime = time;

            currentAngle += SPEED * delta;
            currentAngle %= 360;

            updateNeedle();
            animationId = requestAnimationFrame(animate);
        }

        function startSpin() {
            if (isSpinning) return;

            isSpinning = true;
            lastTime = null;
            btnStart.disabled = true;
            btnStop.disabled = false;
            status.textContent = '돌아가는 중... STOP을 누르세요!';
            circle.classList.remove('stopped');
            hideRoast();

            animationId = requestAnimationFrame(animate);
        }

        // 조롱 메시지 목록
        const roastMessages = [
            { main: '축하합니다!', sub: '오늘의 주인공은 바로 당신!' },
            { main: '걸렸다!', sub: '도망칠 수 없어~' },
            { main: '빵!', sub: '운명이 널 선택했다...' },
            { main: 'YOU!', sub: '변명은 필요 없어요 ㅋㅋ' },
            { main: '당첨!', sub: '축하드립니다 ^_^;;' },
            { main: '딱 걸렸어!', sub: '하하하하하하' },
            { main: 'GOTCHA!', sub: '초침은 거짓말을 하지 않는다' },
            { main: '운명의 장난!', sub: '왜 하필 나한테...' },
            { main: '꽝!', sub: '아 아닙니다... 당첨입니다!' },
            { main: 'BOOM!', sub: '피할 수 없는 운명' },
            { main: '꺼억~', sub: '잘먹겠습니다 ^^' },
        ];

        const flash = document.getElementById('flash');
        const roastMsg = document.getElementById('roastMsg');
        const roastSub = document.getElementById('roastSub');

        function createParticles() {
            const colors = ['#e94560', '#ffd32a', '#00b894', '#6c5ce7', '#fd79a8', '#00cec9'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = (6 + Math.random() * 10) + 'px';
                p.style.height = p.style.width;

                const angle = Math.random() * 360;
                const distance = 100 + Math.random() * 250;
                const dx = Math.cos(angle * Math.PI / 180) * distance;
                const dy = Math.sin(angle * Math.PI / 180) * distance;
                const duration = 0.6 + Math.random() * 0.5;

                p.style.transition = `all ${duration}s ease-out`;
                document.body.appendChild(p);

                requestAnimationFrame(() => {
                    p.style.transform = `translate(${dx}px, ${dy}px)`;
                    p.style.opacity = '0';
                });

                setTimeout(() => p.remove(), duration * 1000 + 100);
            }
        }

        function showRoast() {
            const pick = roastMessages[Math.floor(Math.random() * roastMessages.length)];

            // 배경 번쩍
            flash.classList.remove('show');
            void flash.offsetWidth;
            flash.classList.add('show');

            // 화면 흔들림
            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');

            // 파티클
            createParticles();

            // 메시지
            roastMsg.textContent = pick.main;
            roastMsg.classList.remove('show');
            void roastMsg.offsetWidth;
            roastMsg.classList.add('show');

            roastSub.textContent = pick.sub;
            roastSub.classList.remove('show');
            void roastSub.offsetWidth;
            roastSub.classList.add('show');
        }

        function hideRoast() {
            roastMsg.classList.remove('show');
            roastSub.classList.remove('show');
            flash.classList.remove('show');
            document.body.classList.remove('shake');
        }

        function stopSpin() {
            if (!isSpinning) return;

            isSpinning = false;
            cancelAnimationFrame(animationId);

            btnStart.disabled = false;
            btnStop.disabled = true;
            status.textContent = '';
            circle.classList.add('stopped');

            showRoast();
        }
    </script>
</body>
</html>
